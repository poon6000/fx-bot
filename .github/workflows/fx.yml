name: Send USD/THB to Lark

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  send-rate:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # INSTALL DEPENDENCIES
      # =========================

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # RESTORE PREVIOUS RATE
      # =========================

      - name: Restore previous rate
        id: cache
        uses: actions/cache@v3
        with:
          path: rate.txt
          key: usdthb-rate

      # =========================
      # FETCH CURRENT RATE
      # =========================

      - name: Get USD/THB
        run: |
          set -euo pipefail

          RATE=$(curl -sf \
            "https://open.er-api.com/v6/latest/USD" \
            | jq -r .rates.THB)

          if [ -z "$RATE" ] || [ "$RATE" = "null" ]; then
            echo "❌ Failed to fetch rate"
            exit 1
          fi

          DATE=$(TZ='Asia/Bangkok' date '+%Y-%m-%d')

          echo "RATE=$RATE" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      # =========================
      # CALCULATE CHANGE
      # =========================

      - name: Calculate change
        run: |
          set -euo pipefail

          PREV="0"

          if [ -f rate.txt ]; then
            PREV=$(cat rate.txt)
          fi

          CHANGE=$(echo "$RATE - $PREV" | bc)

          printf "%.2f\n" "$CHANGE" > change.txt

          echo "CHANGE=$(cat change.txt)" >> $GITHUB_ENV

      # =========================
      # SAVE CURRENT RATE
      # =========================

      - name: Save current rate
        run: echo "$RATE" > rate.txt

      # =========================
      # SEND LARK CARD
      # =========================

      - name: Send Lark Card
        run: |
          set -euo pipefail

          JSON=$(jq -n \
            --arg date "$DATE" \
            --arg rate "$RATE" \
            --arg change "$CHANGE" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: {
                    tag: "plain_text",
                    content: "💱 USD/THB Exchange Rate"
                  },
                  template: "blue"
                },
                elements: [
                  {
                    tag: "div",
                    text: {
                      tag: "lark_md",
                      content: "**📅 Date:** \($date)"
                    }
                  },
                  {
                    tag: "div",
                    text: {
                      tag: "lark_md",
                      content: "**💱 Rate:** \($rate) THB"
                    }
                  },
                  {
                    tag: "div",
                    text: {
                      tag: "lark_md",
                      content: "**📊 Change:** \($change)"
                    }
                  }
                ]
              }
            }')

          curl -s -X POST \
            "${{ https://open.larksuite.com/open-apis/bot/v2/hook/a8210dc4-64fb-432d-a6b0-5acced3fc56f }}" \
            -H "Content-Type: application/json" \
            -d "$JSON"