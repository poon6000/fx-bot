name: Send USD/THB to Lark

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  send-rate:
    runs-on: ubuntu-latest

    steps:

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch rate & send to Lark
        run: |
          set -euo pipefail

          # Fetch rate (raw)
          RAW_RATE=$(curl -sf https://open.er-api.com/v6/latest/USD | jq -r .rates.THB)

          # Format to 2 decimals
          RATE=$(printf "%.2f" "$RAW_RATE")

          DATE=$(TZ='Asia/Bangkok' date '+%Y-%m-%d')

          # Send to Lark
          curl -X POST "${{ secrets.LARK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"text\",
              \"content\": {
                \"text\": \"➡️ USD/THB Exchange Rate\n📅 Date: $DATE\n💱 Rate: $RATE THB\"
              }
            }"

          echo "✅ Sent: $RATE THB"
