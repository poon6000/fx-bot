name: FX Rate Bot - Smart Fallback

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fx-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Run FX bot
        id: fx
        continue-on-error: true
        run: |
          set -euo pipefail

          echo "⏰ FX bot started at $(date)"

          FILE_USD="usd_rate.txt"
          FILE_RMB="rmb_rate.txt"
          FILE_USDRMB="usdrmb_rate.txt"
          HISTORY="history.csv"

          DATE=$(TZ='Asia/Bangkok' date '+%Y-%m-%d')
          PREV_DATE=$(TZ='Asia/Bangkok' date -d '4 days ago' '+%Y-%m-%d')
          DAY=$(TZ='Asia/Bangkok' date '+%u')

          SOURCE="BOT"

          # =========================
          # TRY BOT API
          # =========================
          echo "🔄 Fetching from BOT..."

          DATA=$(curl -sf --retry 3 --retry-delay 5 \
            "https://gateway.api.bot.or.th/Stat-ExchangeRate/v2/DAILY_AVG_EXG_RATE/?start_period=$PREV_DATE&end_period=$DATE" \
            -H "Authorization: ${{ secrets.BOT_API_TOKEN }}" \
            -H "Accept: application/json" || echo "")

          USDTHB=$(echo "$DATA" | jq -r '
            .result.data.data_detail[]?
            | select(.currency_id == "USD" and .mid_rate != "")
            | .mid_rate' | tail -1)

          CNYTHB=$(echo "$DATA" | jq -r '
            .result.data.data_detail[]?
            | select(.currency_id == "CNY" and .mid_rate != "")
            | .mid_rate' | tail -1)

          # =========================
          # FALLBACK TO ER API
          # =========================
          if [ -z "$USDTHB" ] || [ -z "$CNYTHB" ]; then
            echo "⚠️ BOT empty → fallback ER API"

            SOURCE="ER API"

            ER=$(curl -sf https://open.er-api.com/v6/latest/USD)

            USDTHB=$(echo "$ER" | jq -r .rates.THB)
            CNYTHB=$(echo "$ER" | jq -r '.rates.THB / .rates.CNY')
          fi

          # =========================
          # FORMAT
          # =========================
          USDTHB=$(printf "%.2f" "$USDTHB")
          CNYTHB=$(printf "%.2f" "$CNYTHB")
          USDRMB=$(printf "%.2f" $(echo "$USDTHB / $CNYTHB" | bc -l))

          echo "✅ USD/THB: $USDTHB"
          echo "✅ CNY/THB: $CNYTHB"
          echo "✅ USD/CNY: $USDRMB"
          echo "📊 Source: $SOURCE"

          # =========================
          # LOAD PREVIOUS
          # =========================
          PREV_USD=$( [ -f "$FILE_USD" ] && cat "$FILE_USD" || echo "$USDTHB" )
          PREV_RMB=$( [ -f "$FILE_RMB" ] && cat "$FILE_RMB" || echo "$CNYTHB" )
          PREV_USDRMB=$( [ -f "$FILE_USDRMB" ] && cat "$FILE_USDRMB" || echo "$USDRMB" )

          CHANGE_USD=$(printf "%.2f" $(echo "$USDTHB - $PREV_USD" | bc))
          CHANGE_RMB=$(printf "%.2f" $(echo "$CNYTHB - $PREV_RMB" | bc))
          CHANGE_USDRMB=$(printf "%.2f" $(echo "$USDRMB - $PREV_USDRMB" | bc))

          # =========================
          # TREND
          # =========================
          if (( $(echo "$CHANGE_USD > 0" | bc -l) )); then
            TREND="📈"
            COLOR="green"
            CHANGE_USD="+$CHANGE_USD"
          elif (( $(echo "$CHANGE_USD < 0" | bc -l) )); then
            TREND="📉"
            COLOR="red"
          else
            TREND="➡️"
            COLOR="grey"
          fi

          if (( $(echo "$CHANGE_RMB > 0" | bc -l) )); then
            CHANGE_RMB="+$CHANGE_RMB"
          fi

          if (( $(echo "$CHANGE_USDRMB > 0" | bc -l) )); then
            CHANGE_USDRMB="+$CHANGE_USDRMB"
          fi

          # =========================
          # SAVE
          # =========================
          echo "$USDTHB" > "$FILE_USD"
          echo "$CNYTHB" > "$FILE_RMB"
          echo "$USDRMB" > "$FILE_USDRMB"
          echo "$DATE,$USDTHB,$CNYTHB,$USDRMB,$SOURCE" >> "$HISTORY"

          # =========================
          # BUILD CARD
          # =========================
          JSON=$(jq -n \
            --arg date "$DATE" \
            --arg usd "$USDTHB" \
            --arg rmb "$CNYTHB" \
            --arg usdrmb "$USDRMB" \
            --arg change_usd "$CHANGE_USD" \
            --arg change_rmb "$CHANGE_RMB" \
            --arg change_usdrmb "$CHANGE_USDRMB" \
            --arg trend "$TREND" \
            --arg color "$COLOR" \
            --arg source "$SOURCE" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: {
                    tag: "plain_text",
                    content: ($trend + " FX Market Update")
                  },
                  template: $color
                },
                elements: [
                  { tag: "div", text: { tag: "lark_md", content: "**📅 Date:** \($date)" } },
                  { tag: "hr" },
                  { tag: "div", text: { tag: "lark_md", content: "**💱 USD/THB:** \($usd)\n📊 \($change_usd)" } },
                  { tag: "div", text: { tag: "lark_md", content: "**💱 CNY/THB:** \($rmb)\n📊 \($change_rmb)" } },
                  { tag: "div", text: { tag: "lark_md", content: "**🔄 USD/CNY:** \($usdrmb)\n📊 \($change_usdrmb)" } },
                  { tag: "hr" },
                  { tag: "note", elements: [
                    { tag: "plain_text", content: ("Source: " + $source) }
                  ]}
                ]
              }
            }')

          RESPONSE=$(curl -s -X POST "${{ secrets.LARK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$JSON")

          echo "Lark response: $RESPONSE"
          echo "✅ Done"

      - name: Send error alert if failed
        if: steps.fx.outcome == 'failure'
        run: |
          curl -X POST "${{ secrets.LARK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"msg_type":"text","content":{"text":"🚨 FX BOT FAILED"}}'

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add *.txt *.csv
          git commit -m "Update FX data" || echo "No changes"
          git push || echo "Push failed"
