name: FX Rate Bot - Unbreakable (USD + RMB + Cross)

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fx-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Run FX bot
        id: fx
        continue-on-error: true
        run: |
          set -euo pipefail

          echo "⏰ FX bot started at $(date)"

          FILE_USD="usd_rate.txt"
          FILE_RMB="rmb_rate.txt"
          FILE_USDRMB="usdrmb_rate.txt"
          HISTORY="history.csv"

          DATE=$(TZ='Asia/Bangkok' date '+%Y-%m-%d')
          DAY=$(TZ='Asia/Bangkok' date '+%u')

          # =========================
          # FETCH DATA (RETRY SAFE)
          # =========================
          DATA=$(curl -sf --retry 3 --retry-delay 5 https://open.er-api.com/v6/latest/USD)

          USDTHB=$(echo "$DATA" | jq -r .rates.THB)
          USDRMB=$(echo "$DATA" | jq -r .rates.CNY)
          RMBTHB=$(echo "$DATA" | jq -r '.rates.THB / .rates.CNY')

          USDTHB=$(printf "%.2f" "$USDTHB")
          RMBTHB=$(printf "%.2f" "$RMBTHB")
          USDRMB=$(printf "%.2f" "$USDRMB")

          # =========================
          # LOAD PREVIOUS
          # =========================
          PREV_USD=$( [ -f "$FILE_USD" ] && cat "$FILE_USD" || echo "$USDTHB" )
          PREV_RMB=$( [ -f "$FILE_RMB" ] && cat "$FILE_RMB" || echo "$RMBTHB" )
          PREV_USDRMB=$( [ -f "$FILE_USDRMB" ] && cat "$FILE_USDRMB" || echo "$USDRMB" )

          CHANGE_USD=$(printf "%.2f" $(echo "$USDTHB - $PREV_USD" | bc))
          CHANGE_RMB=$(printf "%.2f" $(echo "$RMBTHB - $PREV_RMB" | bc))
          CHANGE_USDRMB=$(printf "%.2f" $(echo "$USDRMB - $PREV_USDRMB" | bc))

          ALERT=""

          if (( $(echo "$CHANGE_USD > 0" | bc -l) )); then
            TREND="📈"
            COLOR="green"
            CHANGE_USD="+$CHANGE_USD"
          elif (( $(echo "$CHANGE_USD < 0" | bc -l) )); then
            TREND="📉"
            COLOR="red"
          else
            TREND="➡️"
            COLOR="grey"
          fi

          # Alert logic
          ABS_CHANGE=$(echo "$CHANGE_USD" | sed 's/+//' | awk '{print ($1<0)?-$1:$1}')
          if (( $(echo "$ABS_CHANGE > 0.5" | bc -l) )); then
            ALERT="🚨 Significant USD/THB move!"
          fi

          if (( $(echo "$CHANGE_RMB > 0" | bc -l) )); then
            CHANGE_RMB="+$CHANGE_RMB"
          fi

          if (( $(echo "$CHANGE_USDRMB > 0" | bc -l) )); then
            CHANGE_USDRMB="+$CHANGE_USDRMB"
          fi

          # =========================
          # SAVE DATA
          # =========================
          echo "$USDTHB" > "$FILE_USD"
          echo "$RMBTHB" > "$FILE_RMB"
          echo "$USDRMB" > "$FILE_USDRMB"

          echo "$DATE,$USDTHB,$RMBTHB,$USDRMB" >> "$HISTORY"

          # =========================
          # WEEKLY SUMMARY
          # =========================
          SUMMARY=""
          if [ "$DAY" = "5" ] && [ -f "$HISTORY" ]; then
            WEEK_START=$(tail -n 5 "$HISTORY" | head -n 1 | cut -d',' -f2)
            WEEK_END=$USDTHB
            WEEK_CHANGE=$(printf "%.2f" $(echo "$WEEK_END - $WEEK_START" | bc))
            SUMMARY="📊 Weekly USD/THB Change: $WEEK_CHANGE THB"
          fi

          # =========================
          # BUILD CARD
          # =========================
          JSON=$(jq -n \
            --arg date "$DATE" \
            --arg usd "$USDTHB" \
            --arg rmb "$RMBTHB" \
            --arg usdrmb "$USDRMB" \
            --arg change_usd "$CHANGE_USD" \
            --arg change_rmb "$CHANGE_RMB" \
            --arg change_usdrmb "$CHANGE_USDRMB" \
            --arg trend "$TREND" \
            --arg color "$COLOR" \
            --arg alert "$ALERT" \
            --arg summary "$SUMMARY" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: {
                    tag: "plain_text",
                    content: ($trend + " FX Market Update")
                  },
                  template: $color
                },
                elements: [
                  { tag: "div", text: { tag: "lark_md", content: "**📅 Date:** \($date)" } },
                  { tag: "hr" },
                  { tag: "div", text: { tag: "lark_md", content: "**💱 USD/THB:** \($usd)\n📊 \($change_usd)" } },
                  { tag: "div", text: { tag: "lark_md", content: "**💱 RMB/THB:** \($rmb)\n📊 \($change_rmb)" } },
                  { tag: "div", text: { tag: "lark_md", content: "**🔄 USD/RMB:** \($usdrmb)\n📊 \($change_usdrmb)" } },
                  { tag: "div", text: { tag: "lark_md", content: "\($alert)" } },
                  { tag: "div", text: { tag: "lark_md", content: "\($summary)" } },
                  { tag: "hr" },
                  { tag: "note", elements: [ { tag: "plain_text", content: "FX Bot • Always Watching 👀" } ] }
                ]
              }
            }')

          curl -s -X POST "${{ secrets.LARK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$JSON"

      - name: Send error alert if failed
        if: steps.fx.outcome == 'failure'
        run: |
          curl -X POST "${{ secrets.LARK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"msg_type":"text","content":{"text":"🚨 FX BOT FAILED"}}'

      - name: Commit data safely
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add *.txt *.csv
          git commit -m "Update FX data" || echo "No changes"

          git push || echo "Push failed"
