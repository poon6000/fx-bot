name: Send USD/THB to Lark

on:
  schedule:
    - cron: '27 3 * * *'
  workflow_dispatch:

jobs:
  send-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Get USD/THB
        run: |
          RATE=$(curl -s https://api.exchangerate-api.com/v4/latest/USD | jq .rates.THB)
          DATE=$(TZ='Asia/Bangkok' date '+%Y-%m-%d')
          echo "RATE=$RATE" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Send to Lark
        run: |
          curl -X POST "${{ secrets.LARK_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"📅 $DATE\n💱 USD/THB: $RATE\"}}"